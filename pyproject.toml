[project]
name = "directory-pipeline"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "google-genai>=1.0",
    "numpy>=1.26",
    "pillow>=10.0",
    "requests>=2.32.5",
    "python-dotenv>=1.0",
    "flask>=3.0",
]

[project.optional-dependencies]
# Heavy GPU-dependent OCR models (Surya).
# Install with: pip install -e ".[gpu]"
gpu = [
    "surya-ocr>=0.17.1",
]
# Geocoding and map generation.
# Install with: pip install -e ".[geo]"
geo = [
    "folium>=0.17",
    "geopy>=2.4",
]
# Everything.
# Install with: pip install -e ".[all]"
all = [
    "directory-pipeline[gpu,geo]",
]
